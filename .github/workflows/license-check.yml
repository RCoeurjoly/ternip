name: License Header Check
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check license headers
        run: |
          expected=$(sed '/^$/! s/^/\/\/ /; /^$/s//\/\//' LICENSE)
          num_lines=$(wc -l < LICENSE)
          fail=0
          while IFS= read -r -d '' f; do
            actual=$(head -n "$num_lines" "$f")
            if [ "$actual" != "$expected" ]; then
              echo "Incorrect or missing license header: $f"
              fail=1
            fi
          done < <(find rtl \( -name "*.sv" -o -name "*.v" \) -print0)
          exit $fail
